name: mousepad
description: Remote mouse/trackpad for tablet — controls your desktop over WebSocket.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/mousepad.jpg"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon/mousepad.jpg"
  remove_alpha_channel: true
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/icon/mousepad.jpg
