name: Build Mousepad Server

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: MousepadServer.exe
            binary: server/dist/MousepadServer.exe
          - os: macos-latest
            artifact_name: MousepadServer-macOS
            binary: server/dist/MousepadServer

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyautogui pyinstaller

      - name: Build binary
        working-directory: server
        run: pyinstaller --onefile --name MousepadServer server.py

      - name: Rename macOS binary
        if: matrix.os == 'macos-latest'
        run: mv server/dist/MousepadServer server/dist/MousepadServer-macOS

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: server-latest
          name: Mousepad Server (latest)
          prerelease: false
          files: ${{ matrix.binary }}
