name: Build Mousepad Server

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            binary: server/dist/MousepadServer.exe
            asset_name: MousepadServer.exe
          - os: macos-latest
            binary: server/dist/MousepadServer
            asset_name: MousepadServer-macOS

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyautogui pyinstaller

      - name: Build binary
        working-directory: server
        run: pyinstaller --onefile --name MousepadServer server.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.binary }}
          retention-days: 90

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: MousepadServer.exe
          path: dist/

      - name: Download macOS binary
        uses: actions/download-artifact@v4
        with:
          name: MousepadServer-macOS
          path: dist/

      - name: Rename macOS binary
        run: mv dist/MousepadServer dist/MousepadServer-macOS

      - name: Delete existing release
        run: |
          gh release delete server-latest --yes --repo ${{ github.repository }} || true
          git -c http.extraHeader="Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            ls-remote --tags origin | grep server-latest && \
            gh api repos/${{ github.repository }}/git/refs/tags/server-latest \
              -X DELETE --silent || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        run: |
          gh release create server-latest \
            --repo ${{ github.repository }} \
            --title "Mousepad Server (latest)" \
            --notes "Latest Mousepad Server build. Download the file for your OS and run it." \
            dist/MousepadServer.exe \
            dist/MousepadServer-macOS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
