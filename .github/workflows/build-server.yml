name: Build Mousepad Server

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: MousepadServer-Windows
            binary: server/dist/MousepadServer.exe
          - os: macos-latest
            artifact: MousepadServer-macOS
            binary: server/dist/MousepadServer

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyautogui pyinstaller

      - name: Build binary
        working-directory: server
        run: pyinstaller --onefile --name MousepadServer server.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}
          retention-days: 90
